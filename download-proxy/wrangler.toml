# substrate-kernels download proxy.
#
# Bound at the two public hostnames the README documents — clients use the
# same URL they did when R2 served directly; the Worker is now in front of
# the bucket, serving via the R2 binding (no S3 SigV4, no egress fees) and
# emitting one kernel_download analytics event per full download.
#
# The Worker MUST live in the same Cloudflare account as the analytics
# `analytics-events` queue (cross-account queue producer bindings are not
# supported). That same account hosts the substrate-kernels R2 bucket and
# the analytics workers.
#
# docs/design/download-proxy.md is authoritative.

name = "substrate-kernels-download-proxy"
main = "src/index.ts"
compatibility_date = "2025-04-01"
# Disable the *.workers.dev URL — the Worker is only reachable via the
# custom_domain routes below. No leaky default hostname.
workers_dev = false

# The R2 bucket that release.yml uploads `.kernel` bundles + SHA256SUMS to.
# Bound directly — the Worker never speaks S3.
[[r2_buckets]]
binding = "KERNELS"
bucket_name = "substrate-kernels"

# Producer side of the analytics events queue — declared in the analytics
# repo's wrangler.toml. The proxy-producer library writes onto this binding.
[[queues.producers]]
binding = "EVENTS_QUEUE"
queue = "analytics-events"

# Listing-page analytics (docs/adr/0012). `GET /` loads the RudderStack SDK
# via the same-origin reverse proxy at /_data/* on this worker. The SDK
# posts events to /_data/v1/<type>; the worker forwards Worker-to-Worker to
# ${ANALYTICS_DATA_PLANE_URL}/v1/batch. Per-host write keys map each domain
# to its `source = WEB:<HOSTNAME UPPERCASE>` on the analytics side. Write
# keys are NOT secrets (analytics ADR 0010), so they live in [vars]. The SDK
# is injected only when a write key is configured for the request host —
# until AGX_ANALYTICS_KEYS is set, the page renders without the SDK
# (graceful). The only analytics-side requirement now is the per-domain web
# write key in the AGX_ANALYTICS_KEYS KV (each: `{ source: "WEB:KERNELS.AGX.SO",
# enabled: true }`); the CORS contract on data.agx.so is no longer
# load-bearing for this page since nothing on it talks to data.agx.so
# directly.
[vars]
ANALYTICS_DATA_PLANE_URL = "https://data.agx.so"
# Per-host web write keys (not secrets — analytics ADR 0010). Each key's
# analytics-side KV record stamps the matching source; the proxy's own
# kernel_download event derives the same WEB:<HOST> string from the request
# host, so the page events and the download event share `source` per host.
# NOTE: the kernels.substrate.so key was originally provisioned for
# kernels.substrate.loopholelabs.io — its analytics-side AGX_ANALYTICS_KEYS
# KV record must read `{ source: "WEB:KERNELS.SUBSTRATE.SO", enabled: true }`
# before the SDK events on the new host carry the right source.
AGX_ANALYTICS_KEYS = '{"kernels.agx.so":"99bc203c52705a8f0d6027f3f08c5e3ffe775fd9db3d9881","kernels.substrate.so":"19bd9b376d833af85b1e0e55edaba2f5fc6750e78e5f1382"}'

# Per-IP rate limit: 60 req/min. Public + unauthenticated; this bounds
# (a) Workers CPU/request quota from a single source, (b) the analytics
# queue fan-out from one chatty IP. namespace_id is account-scoped — pick
# a unique number per Rate Limiting binding in this account.
[[unsafe.bindings]]
name = "DOWNLOAD_RATE_LIMITER_IP"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 60, period = 60 }

# Both public hostnames. `custom_domain = true` captures ALL paths of the
# subdomain automatically (no `/*` glob — that's the route shape, not the
# custom-domain shape; see CF docs on Workers routing). Cloudflare creates
# the DNS + SSL records on first deploy. Direct R2 S3 URLs remain
# accessible as a break-glass for ops; clients use these.
[[routes]]
pattern = "kernels.substrate.so"
custom_domain = true

[[routes]]
pattern = "kernels.agx.so"
custom_domain = true

# Workers Logs + traces. Pattern mirrors agx/cloud/local-certificates: the
# top-level [observability] block is the rollup; logs + traces are enabled
# per-subblock with persistence + invocation logging.
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
