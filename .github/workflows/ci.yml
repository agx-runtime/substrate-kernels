name: CI

# Gates for the substrate-kernels build (testing/strategy.md). Modeled on substrate's
# CI: each gate is its own attributable job. The fast static/apply/config gates run
# on every PR; the slow lanes (full kernel build, interim QEMU boot, repro-check)
# run too but are the heavy ones. The Makefile — not this YAML — owns each gate's
# invocation. CI covers x86_64 + aarch64 only (substrate's hosts); riscv64 and the
# windows variant are carried but not CI-gated (ADR 0002).
#
# The Linux build stages run inside the pinned container (tools/build/Dockerfile) so
# CI uses the same toolchain as a macOS dev host (ADR 0005). The container always
# cross-compiles via the arch-prefixed toolchain, so both arches build from one
# runner.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ---- fast static gates (no kernel tree) ---------------------------------------
  static:
    runs-on: nscloud-ubuntu-24.04-amd64-2x4
    steps:
      - uses: actions/checkout@v6
      - name: Install pyelftools (the packer's ELF dependency)
        run: sudo apt-get update && sudo apt-get install -y python3-pyelftools
      - name: doc-manifest + bundle-golden + pack-unit
        run: make ci

  # ---- patch series applies clean at -p1 with zero fuzz (ADR 0007) --------------
  applies-clean:
    runs-on: nscloud-ubuntu-24.04-amd64-2x4
    strategy:
      fail-fast: false
      matrix:
        kernel_line: ["6.12", "6.18"]
    steps:
      - uses: actions/checkout@v6
      - name: Cache the pinned kernel tarball
        uses: actions/cache@v5
        with:
          path: tarballs
          key: kernel-tarball-${{ matrix.kernel_line }}-${{ hashFiles('scripts/kernel-pins/*.env') }}
      - name: Apply the series (zero fuzz)
        run: make applies-clean KERNEL_LINE=${{ matrix.kernel_line }} VARIANT=base ARCH=x86_64

  # ---- config-invariant: olddefconfig + required/forbidden per cell (ADR 0006) --
  config:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { kernel_line: "6.12", arch: x86_64, rarch: amd64, variant: base }
          - { kernel_line: "6.12", arch: x86_64, rarch: amd64, variant: debug }
          - { kernel_line: "6.12", arch: aarch64, rarch: arm64, variant: base }
          - { kernel_line: "6.12", arch: aarch64, rarch: arm64, variant: debug }
          - { kernel_line: "6.18", arch: x86_64, rarch: amd64, variant: base }
          - { kernel_line: "6.18", arch: x86_64, rarch: amd64, variant: debug }
          - { kernel_line: "6.18", arch: aarch64, rarch: arm64, variant: base }
          - { kernel_line: "6.18", arch: aarch64, rarch: arm64, variant: debug }
    runs-on:
      - nscloud-ubuntu-24.04-${{ matrix.rarch }}-8x16-with-cache;github.run-id=${{ github.run_id }}
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-substrate-kernels-${{ matrix.rarch }}
      - nscloud-container-image-cache
      - namespace-features:container.privileged=true
    steps:
      - uses: actions/checkout@v6
      - name: Cache the pinned kernel tarball
        uses: actions/cache@v5
        with:
          path: tarballs
          key: kernel-tarball-${{ matrix.kernel_line }}-${{ hashFiles('scripts/kernel-pins/*.env') }}
      - name: Build the pinned toolchain container
        run: docker build -t substrate-kernels-build tools/build
      - name: configure (olddefconfig + config-invariant), no compile
        run: |
          docker run --rm -v "$PWD":/work -w /work substrate-kernels-build \
            make configured KERNEL_LINE=${{ matrix.kernel_line }} ARCH=${{ matrix.arch }} VARIANT=${{ matrix.variant }}

  # ---- full build → the .kernel bundle ------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { kernel_line: "6.12", arch: x86_64, rarch: amd64, variant: base }
          - { kernel_line: "6.12", arch: x86_64, rarch: amd64, variant: debug }
          - { kernel_line: "6.12", arch: aarch64, rarch: arm64, variant: base }
          - { kernel_line: "6.12", arch: aarch64, rarch: arm64, variant: debug }
          - { kernel_line: "6.18", arch: x86_64, rarch: amd64, variant: base }
          - { kernel_line: "6.18", arch: x86_64, rarch: amd64, variant: debug }
          - { kernel_line: "6.18", arch: aarch64, rarch: arm64, variant: base }
          - { kernel_line: "6.18", arch: aarch64, rarch: arm64, variant: debug }
    runs-on:
      - nscloud-ubuntu-24.04-${{ matrix.rarch }}-8x16-with-cache;github.run-id=${{ github.run_id }}
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-substrate-kernels-${{ matrix.rarch }}
      - nscloud-container-image-cache
      - namespace-features:container.privileged=true
    steps:
      - uses: actions/checkout@v6
      - name: Cache the pinned kernel tarball
        uses: actions/cache@v5
        with:
          path: tarballs
          key: kernel-tarball-${{ matrix.kernel_line }}-${{ hashFiles('scripts/kernel-pins/*.env') }}
      - name: Build the pinned toolchain container
        run: docker build -t substrate-kernels-build tools/build
      - name: Build the bundle (compile + pack) in the pinned container
        run: |
          docker run --rm -v "$PWD":/work -w /work substrate-kernels-build \
            make all KERNEL_LINE=${{ matrix.kernel_line }} ARCH=${{ matrix.arch }} VARIANT=${{ matrix.variant }}
      - name: Stage the kernel binary for the boot-smoke lane
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            cp build/linux-*-${{ matrix.variant }}-x86_64/linux-*/vmlinux kernel-binary
          else
            cp build/linux-*-${{ matrix.variant }}-aarch64/linux-*/arch/arm64/boot/Image kernel-binary
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.kernel_line }}-${{ matrix.variant }}-${{ matrix.arch }}
          path: |
            linux-*-${{ matrix.variant }}-${{ matrix.arch }}.kernel
            kernel-binary
          if-no-files-found: error

  # ---- interim QEMU boot (testing/boot-smoke.md) --------------------------------
  # Real boot-smoke (under substrate) is the cross-repo lane (ADR 0004 §4); this
  # boots the produced kernel under QEMU — at both 512 MiB and 2048 MiB — and
  # checks for the kernel banner. QEMU's own -kernel loader places the Image, so
  # the bundle's load_addr is locked by bundle-golden, not exercised here.
  boot-smoke:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { kernel_line: "6.12", arch: x86_64, rarch: amd64, variant: base }
          - { kernel_line: "6.12", arch: x86_64, rarch: amd64, variant: debug }
          - { kernel_line: "6.12", arch: aarch64, rarch: arm64, variant: base }
          - { kernel_line: "6.12", arch: aarch64, rarch: arm64, variant: debug }
          - { kernel_line: "6.18", arch: x86_64, rarch: amd64, variant: base }
          - { kernel_line: "6.18", arch: x86_64, rarch: amd64, variant: debug }
          - { kernel_line: "6.18", arch: aarch64, rarch: arm64, variant: base }
          - { kernel_line: "6.18", arch: aarch64, rarch: arm64, variant: debug }
    runs-on:
      - nscloud-ubuntu-24.04-${{ matrix.rarch }}-8x16-with-cache;github.run-id=${{ github.run_id }}
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-substrate-kernels-${{ matrix.rarch }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: bundle-${{ matrix.kernel_line }}-${{ matrix.variant }}-${{ matrix.arch }}
      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-system-arm
      - name: Boot the kernel under QEMU
        run: bash scripts/boot-smoke.sh --arch ${{ matrix.arch }} --kernel kernel-binary --timeout 240

  # ---- reproducibility: byte-identical rebuild (ADR 0005) -----------------------
  # The double-compile is slow; run on main + manual dispatch (the PR signal comes
  # from the build lane). Cross-host (macOS) determinism is exercised separately.
  repro-check:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { kernel_line: "6.12", arch: x86_64, rarch: amd64, variant: base }
          - { kernel_line: "6.12", arch: x86_64, rarch: amd64, variant: debug }
          - { kernel_line: "6.12", arch: aarch64, rarch: arm64, variant: base }
          - { kernel_line: "6.12", arch: aarch64, rarch: arm64, variant: debug }
          - { kernel_line: "6.18", arch: x86_64, rarch: amd64, variant: base }
          - { kernel_line: "6.18", arch: x86_64, rarch: amd64, variant: debug }
          - { kernel_line: "6.18", arch: aarch64, rarch: arm64, variant: base }
          - { kernel_line: "6.18", arch: aarch64, rarch: arm64, variant: debug }
    runs-on:
      - nscloud-ubuntu-24.04-${{ matrix.rarch }}-8x16-with-cache;github.run-id=${{ github.run_id }}
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-substrate-kernels-${{ matrix.rarch }}
      - nscloud-container-image-cache
      - namespace-features:container.privileged=true
    steps:
      - uses: actions/checkout@v6
      - name: Cache the pinned kernel tarball
        uses: actions/cache@v5
        with:
          path: tarballs
          key: kernel-tarball-${{ matrix.kernel_line }}-${{ hashFiles('scripts/kernel-pins/*.env') }}
      - name: Build the pinned toolchain container
        run: docker build -t substrate-kernels-build tools/build
      - name: Assert byte-identical rebuild
        run: |
          docker run --rm -v "$PWD":/work -w /work substrate-kernels-build \
            make repro-check KERNEL_LINE=${{ matrix.kernel_line }} ARCH=${{ matrix.arch }} VARIANT=${{ matrix.variant }}
