name: Release

run-name: Release commit ${{ inputs.commit }}

# Releases are deliberate and repository-commit scoped. The operator supplies an
# exact 40-character commit SHA; every job checks out that same commit, builds both
# supported LTS lines, and publishes the eight bundles as one atomic release.
# GitHub Releases require a tag, so the workflow creates the implementation tag
# build-<12-char-sha>. Upstream kernel versions remain in the artifact filenames.

on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Exact 40-character substrate-kernels commit SHA to release"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.commit }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: nscloud-ubuntu-24.04-amd64-2x4
    outputs:
      commit: ${{ steps.release.outputs.commit }}
      short_sha: ${{ steps.release.outputs.short_sha }}
      tag: ${{ steps.release.outputs.tag }}
      version_612: ${{ steps.release.outputs.version_612 }}
      version_618: ${{ steps.release.outputs.version_618 }}
      source_sha256_612: ${{ steps.release.outputs.source_sha256_612 }}
      source_sha256_618: ${{ steps.release.outputs.source_sha256_618 }}
    steps:
      - name: Validate the requested commit format
        env:
          REQUESTED_COMMIT: ${{ inputs.commit }}
        run: |
          set -euo pipefail
          if [[ ! "$REQUESTED_COMMIT" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::commit must be a full 40-character hexadecimal SHA"
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit }}
          fetch-depth: 1
      - name: Resolve release identity and kernel pins
        id: release
        env:
          REQUESTED_COMMIT: ${{ inputs.commit }}
        run: |
          set -euo pipefail
          resolved=$(git rev-parse HEAD)
          requested=$(printf '%s' "$REQUESTED_COMMIT" | tr 'A-F' 'a-f')
          if [ "$resolved" != "$requested" ]; then
            echo "::error::checkout resolved to $resolved, not requested commit $requested"
            exit 1
          fi

          . scripts/kernel-pins/6.12.env
          version_612=$KERNEL_VERSION
          source_sha256_612=$KERNEL_SHA256
          . scripts/kernel-pins/6.18.env
          version_618=$KERNEL_VERSION
          source_sha256_618=$KERNEL_SHA256

          short_sha=${resolved:0:12}
          {
            echo "commit=$resolved"
            echo "short_sha=$short_sha"
            echo "tag=build-$short_sha"
            echo "version_612=$version_612"
            echo "version_618=$version_618"
            echo "source_sha256_612=$source_sha256_612"
            echo "source_sha256_618=$source_sha256_618"
          } >> "$GITHUB_OUTPUT"

          echo "Release commit: $resolved"
          echo "Kernel pins: linux $version_612 and linux $version_618"

  # Both lines must build before publish starts: no partial release is possible.
  build:
    needs: prepare
    strategy:
      fail-fast: true
      matrix:
        include:
          - { kernel_line: "6.12", arch: x86_64, rarch: amd64, variant: base }
          - { kernel_line: "6.12", arch: x86_64, rarch: amd64, variant: debug }
          - { kernel_line: "6.12", arch: aarch64, rarch: arm64, variant: base }
          - { kernel_line: "6.12", arch: aarch64, rarch: arm64, variant: debug }
          - { kernel_line: "6.18", arch: x86_64, rarch: amd64, variant: base }
          - { kernel_line: "6.18", arch: x86_64, rarch: amd64, variant: debug }
          - { kernel_line: "6.18", arch: aarch64, rarch: arm64, variant: base }
          - { kernel_line: "6.18", arch: aarch64, rarch: arm64, variant: debug }
    runs-on:
      - nscloud-ubuntu-24.04-${{ matrix.rarch }}-8x16-with-cache;github.run-id=${{ github.run_id }}
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-substrate-kernels-${{ matrix.rarch }}
      - nscloud-container-image-cache
      - namespace-features:container.privileged=true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.commit }}
          fetch-depth: 1
      - name: Read the selected pin
        id: pin
        run: |
          set -euo pipefail
          . "scripts/kernel-pins/${{ matrix.kernel_line }}.env"
          echo "version=$KERNEL_VERSION" >> "$GITHUB_OUTPUT"
      - name: Cache the pinned kernel tarball
        uses: actions/cache@v5
        with:
          path: tarballs
          key: kernel-tarball-${{ matrix.kernel_line }}-${{ hashFiles('scripts/kernel-pins/*.env') }}
      - name: Build the pinned toolchain container
        run: docker build -t substrate-kernels-build tools/build
      - name: Build the bundle (compile + pack) in the pinned container
        run: |
          docker run --rm -v "$PWD":/work -w /work substrate-kernels-build \
            make all KERNEL_LINE=${{ matrix.kernel_line }} ARCH=${{ matrix.arch }} VARIANT=${{ matrix.variant }}
      - uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.kernel_line }}-${{ matrix.variant }}-${{ matrix.arch }}
          path: linux-${{ steps.pin.outputs.version }}-${{ matrix.variant }}-${{ matrix.arch }}.kernel
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    runs-on: nscloud-ubuntu-24.04-amd64-2x4
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      COMMIT: ${{ needs.prepare.outputs.commit }}
      SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
      TAG: ${{ needs.prepare.outputs.tag }}
      VERSION_612: ${{ needs.prepare.outputs.version_612 }}
      VERSION_618: ${{ needs.prepare.outputs.version_618 }}
      SOURCE_SHA256_612: ${{ needs.prepare.outputs.source_sha256_612 }}
      SOURCE_SHA256_618: ${{ needs.prepare.outputs.source_sha256_618 }}
      GH_TOKEN: ${{ github.token }}
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.commit }}
          fetch-depth: 1
      - uses: actions/download-artifact@v8
        with:
          pattern: bundle-*
          merge-multiple: true
      - name: Verify the complete artifact set and write checksums
        run: |
          set -euo pipefail
          bundles=(
            "linux-${VERSION_612}-base-x86_64.kernel"
            "linux-${VERSION_612}-base-aarch64.kernel"
            "linux-${VERSION_612}-debug-x86_64.kernel"
            "linux-${VERSION_612}-debug-aarch64.kernel"
            "linux-${VERSION_618}-base-x86_64.kernel"
            "linux-${VERSION_618}-base-aarch64.kernel"
            "linux-${VERSION_618}-debug-x86_64.kernel"
            "linux-${VERSION_618}-debug-aarch64.kernel"
          )
          for bundle in "${bundles[@]}"; do
            test -f "$bundle" || { echo "::error::missing release artifact $bundle"; exit 1; }
          done
          sha256sum "${bundles[@]}" | LC_ALL=C sort -k2 > SHA256SUMS
          grep "  linux-${VERSION_612}-" SHA256SUMS > "linux-${VERSION_612}-SHA256SUMS"
          grep "  linux-${VERSION_618}-" SHA256SUMS > "linux-${VERSION_618}-SHA256SUMS"
          cat SHA256SUMS
      - name: Write the release manifest
        run: |
          cat > RELEASE-MANIFEST.json <<EOF
          {
            "repository": "$GITHUB_REPOSITORY",
            "commit": "$COMMIT",
            "release_tag": "$TAG",
            "kernels": {
              "6.12": { "version": "$VERSION_612", "source_sha256": "$SOURCE_SHA256_612" },
              "6.18": { "version": "$VERSION_618", "source_sha256": "$SOURCE_SHA256_618" }
            }
          }
          EOF
      - name: Attest release provenance
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            linux-*.kernel
            SHA256SUMS
            linux-*-SHA256SUMS
            RELEASE-MANIFEST.json
      - name: Stage attestation artifacts
        run: |
          set -euo pipefail
          attestation="substrate-kernels-${SHORT_SHA}-attestations.sigstore.jsonl"
          cp "${{ steps.attest.outputs.bundle-path }}" "$attestation"
          cp "$attestation" "linux-${VERSION_612}-attestations.sigstore.jsonl"
          cp "$attestation" "linux-${VERSION_618}-attestations.sigstore.jsonl"
      - name: Write release notes
        run: |
          cat > RELEASE_NOTES.md <<EOF
          substrate-kernels **$TAG**, built from repository commit **$COMMIT**.

          This is one atomic release for both pinned LTS lines:

          - linux $VERSION_612 (source sha256 $SOURCE_SHA256_612)
          - linux $VERSION_618 (source sha256 $SOURCE_SHA256_618)

          Each line contains **base** and **debug** bundles for **x86_64** and
          **aarch64** (eight .kernel files total). **SHA256SUMS** covers all
          eight bundles; the two version-scoped checksum files are the matching
          R2 download manifests. **RELEASE-MANIFEST.json** records the exact
          repository commit and source pins.

          Every bundle and manifest carries keyless SLSA build provenance. Verify
          a bundle with:

              gh attestation verify linux-$VERSION_612-base-x86_64.kernel --repo $GITHUB_REPOSITORY

          The GitHub release/tag is the immutable, commit-scoped release identity.
          R2 keeps the existing upstream-version URLs as consumer aliases, for
          example:

              https://kernels.substrate.so/linux-$VERSION_612-base-x86_64.kernel
              https://kernels.substrate.so/linux-$VERSION_618-base-x86_64.kernel

          Releasing a different commit without changing a kernel pin replaces that
          line's same-named R2 aliases; the commit-scoped GitHub releases retain
          the historical artifacts and provenance.
          EOF
      - name: Create or update the commit-scoped GitHub Release
        run: |
          set -euo pipefail
          assets=(
            linux-*.kernel
            SHA256SUMS
            linux-*-SHA256SUMS
            RELEASE-MANIFEST.json
            "substrate-kernels-${SHORT_SHA}-attestations.sigstore.jsonl"
          )

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
            tagged_commit=$(git rev-list -n 1 "$TAG")
            if [ "$tagged_commit" != "$COMMIT" ]; then
              echo "::error::tag $TAG already points to $tagged_commit, not $COMMIT"
              exit 1
            fi
          fi

          title="substrate-kernels $TAG (linux $VERSION_612 + $VERSION_618)"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$title" --notes-file RELEASE_NOTES.md
            gh release upload "$TAG" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$COMMIT" \
              --title "$title" \
              --notes-file RELEASE_NOTES.md
          fi

      # R2 is a best-effort public mirror. A missing token skips it; configured
      # credentials turn upload failures into a visible failed workflow rerun.
      - name: Mirror both kernel lines to Cloudflare R2
        if: ${{ env.CF_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            r2 object put "${{ vars.R2_BUCKET }}/linux-${{ env.VERSION_612 }}-base-x86_64.kernel" --file=linux-${{ env.VERSION_612 }}-base-x86_64.kernel --remote
            r2 object put "${{ vars.R2_BUCKET }}/linux-${{ env.VERSION_612 }}-base-aarch64.kernel" --file=linux-${{ env.VERSION_612 }}-base-aarch64.kernel --remote
            r2 object put "${{ vars.R2_BUCKET }}/linux-${{ env.VERSION_612 }}-debug-x86_64.kernel" --file=linux-${{ env.VERSION_612 }}-debug-x86_64.kernel --remote
            r2 object put "${{ vars.R2_BUCKET }}/linux-${{ env.VERSION_612 }}-debug-aarch64.kernel" --file=linux-${{ env.VERSION_612 }}-debug-aarch64.kernel --remote
            r2 object put "${{ vars.R2_BUCKET }}/linux-${{ env.VERSION_618 }}-base-x86_64.kernel" --file=linux-${{ env.VERSION_618 }}-base-x86_64.kernel --remote
            r2 object put "${{ vars.R2_BUCKET }}/linux-${{ env.VERSION_618 }}-base-aarch64.kernel" --file=linux-${{ env.VERSION_618 }}-base-aarch64.kernel --remote
            r2 object put "${{ vars.R2_BUCKET }}/linux-${{ env.VERSION_618 }}-debug-x86_64.kernel" --file=linux-${{ env.VERSION_618 }}-debug-x86_64.kernel --remote
            r2 object put "${{ vars.R2_BUCKET }}/linux-${{ env.VERSION_618 }}-debug-aarch64.kernel" --file=linux-${{ env.VERSION_618 }}-debug-aarch64.kernel --remote
            r2 object put "${{ vars.R2_BUCKET }}/linux-${{ env.VERSION_612 }}-SHA256SUMS" --file=linux-${{ env.VERSION_612 }}-SHA256SUMS --remote
            r2 object put "${{ vars.R2_BUCKET }}/linux-${{ env.VERSION_618 }}-SHA256SUMS" --file=linux-${{ env.VERSION_618 }}-SHA256SUMS --remote
            r2 object put "${{ vars.R2_BUCKET }}/linux-${{ env.VERSION_612 }}-attestations.sigstore.jsonl" --file=linux-${{ env.VERSION_612 }}-attestations.sigstore.jsonl --remote
            r2 object put "${{ vars.R2_BUCKET }}/linux-${{ env.VERSION_618 }}-attestations.sigstore.jsonl" --file=linux-${{ env.VERSION_618 }}-attestations.sigstore.jsonl --remote
